<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Voyages — Paul Zabotto</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Paul Zabotto — Globe interactif de voyages." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="voyage-nav">
      <a href="/" class="voyage-nav__back" aria-label="Retour au portfolio">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="10 4 6 8 10 12"/></svg>
        Paul Zabotto
      </a>
    </header>

    <!-- Globe fills the viewport below the nav -->
    <div id="globe">
        <div id="globe-loading">
            <div class="globe-loading-dot"></div>
            <span>Loading globe&hellip;</span>
        </div>
    </div>

    <!-- Drag hint — fades after first interaction -->
    <div id="globe-hint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
        Drag to explore
    </div>

    <div id="stats-bar">
        <div class="stat-item">
            <span class="stat-number" id="stat-countries">—</span>
            <span class="stat-label">countries</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-number" id="stat-photos">—</span>
            <span class="stat-label">photos</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-number" id="stat-continents">—</span>
            <span class="stat-label">continents</span>
        </div>
    </div>

    <div id="side-panel">
        <button id="panel-close" aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
        <div id="panel-inner"></div>
    </div>
    <div id="panel-backdrop"></div>

    <div id="lightbox">
        <div id="lightbox-overlay"></div>
        <button id="lb-close" aria-label="Fermer">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M1 1L17 17M17 1L1 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </button>
        <button id="lb-prev">&#8249;</button>
        <button id="lb-next">&#8250;</button>
        <div id="lb-img-wrap">
            <img id="lb-img" src="" alt="">
        </div>
        <div id="lb-info">
            <span id="lb-counter"></span>
        </div>
    </div>

    <!-- Globe.gl (bundles Three.js — no separate import needed) -->
    <script src="//unpkg.com/globe.gl/dist/globe.gl.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
